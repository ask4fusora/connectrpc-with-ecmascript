version: v2

inputs:
  - directory: proto

plugins:
  - remote: buf.build/bufbuild/es
    out: frontend/gen
    opt:
      - target=ts
  - remote: buf.build/bufbuild/es
    out: backend/vanilla/gen
    opt:
      - target=ts
  - remote: buf.build/bufbuild/es
    out: backend/nestjs-3rd-party/gen
    opt:
      - target=ts

managed:
  enabled: true
