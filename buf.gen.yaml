version: v2

inputs:
  - directory: proto
  - module: buf.build/grpc/grpc
    paths:
      - grpc/health/v1

plugins:
  - remote: buf.build/bufbuild/es
    out: frontend/gen
    opt:
      - target=ts
  - remote: buf.build/bufbuild/es
    out: backend/counter-service/gen
    opt:
      - target=ts

managed:
  enabled: true
